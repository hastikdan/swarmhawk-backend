name: Daily Outreach Scan (2am CET)

on:
  schedule:
    # 01:00 UTC = 02:00 CET (winter) / 03:00 CEST (summer → still runs early enough)
    - cron: "0 1 * * *"
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  trigger-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Wake up Render dyno
        run: |
          echo "Pinging health endpoint to wake Render free tier..."
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://swarmhawk-backend.onrender.com/health)
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "200" ]; then break; fi
            sleep 20
          done

      - name: Trigger daily outreach scan
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST https://swarmhawk-backend.onrender.com/outreach/internal/cron \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          BODY=$(echo "$RESPONSE" | sed '/^HTTP_STATUS:/d')
          STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          echo "Response: $BODY"
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Scan trigger failed with status $STATUS"
            exit 1
          fi
